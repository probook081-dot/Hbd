<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A SPECIAL DAY</title>

<style>
:root{
    --bg:#0f172a;
    --text:#e2e8f0;
    --accent:#38bdf8;
}

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(circle at 20% 20%, #1e293b, var(--bg));
    color:var(--text);
    overflow-x:hidden;
}

/* 🌌 CENTER GLOW */
body::before{
    content:"";
    position:fixed;
    top:50%;
    left:50%;
    width:600px;
    height:600px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(56,189,248,0.15), transparent 70%);
    filter:blur(60px);
    z-index:-1;
}

/* TITLE */
h1{
    font-size:3.2rem;
    font-weight:800;
    letter-spacing:2px;
    transform: perspective(600px) rotateX(15deg);
    background:linear-gradient(90deg,#38bdf8,#a78bfa,#f472b6);
    -webkit-background-clip:text;
    color:transparent;
    text-shadow:0 0 25px rgba(56,189,248,0.4);
}

/* STARS */
.star{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    opacity:0.6;
    animation:twinkle 4s infinite alternate;
}
@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:0.9;}
}

/* SHOOTING STAR */
.shooting-star{
    position:fixed;
    width:3px;
    height:3px;
    background:white;
    box-shadow:0 0 12px white;
    animation:shoot 1.2s linear forwards;
}
@keyframes shoot{
    0%{transform:translate(0,0); opacity:1;}
    100%{transform:translate(500px,500px); opacity:0;}
}

/* SECTIONS */
.section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:40px 20px;
    opacity:0;
    transform:translateY(40px);
    transition:1s ease;
}

.section.visible{
    opacity:1;
    transform:translateY(0);
}

/* POPPER */
.popper{
    font-size:2.2rem;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}
.popper:hover{
    transform:scale(1.4);
    filter:drop-shadow(0 0 10px #38bdf8);
}

/* 🎞️ SLIDER */
.slider{
    width:100%;
    overflow:hidden;
    margin-top:-20px;
    padding:20px 0;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.05);
    border-radius:30px;
    border:1px solid rgba(255,255,255,0.1);
    position:relative;
}

/* EDGE FADE */
.slider::before,
.slider::after{
    content:"";
    position:absolute;
    top:0;
    width:80px;
    height:100%;
    z-index:2;
}
.slider::before{
    left:0;
    background:linear-gradient(to right,#0f172a,transparent);
}
.slider::after{
    right:0;
    background:linear-gradient(to left,#0f172a,transparent);
}

.slide-track{
    display:flex;
    gap:30px;
    width:max-content;
    animation:scroll 40s linear infinite;
}

.slide-track img{
    width:340px;
    height:260px;
    object-fit:contain;
    background:linear-gradient(135deg,#1e293b,#0f172a);
    border-radius:25px;
    box-shadow:0 30px 60px rgba(0,0,0,0.9);
    transition:0.4s;
    padding:5px;
}

.slide-track img:hover{
    transform:scale(1.08);
}

@keyframes scroll{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(-50%); }
}

/* FLOWERS (REDUCED) */
.flower{
    position:fixed;
    top:-20px;
    font-size:18px;
    animation:fall linear forwards;
    pointer-events:none;
}
@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0.9;
    }
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:6px;
    height:6px;
    animation:confettiFall linear forwards;
}
@keyframes confettiFall{
    to{
        transform:translateY(100vh);
    }
}
</style>
</head>

<body>

<div class="section">
    <h1 id="title"></h1>
    <div class="popper" onclick="bigBlast()">🎉</div>
</div>

<div class="section">
    <div class="slider">
        <div class="slide-track">

            <img src="1.jpeg">
            <img src="2.jpeg">
            <img src="3.jpeg">
            <img src="4.jpeg">
            <img src="5.jpeg">
            <img src="6.jpeg">

            <img src="1.jpeg">
            <img src="2.jpeg">
            <img src="3.jpeg">
            <img src="4.jpeg">
            <img src="5.jpeg">
            <img src="6.jpeg">

        </div>
    </div>
</div>

<script>

const name = prompt("Enter name") || "Special One";

/* TYPING */
const text = `HAPPY BIRTHDAY TO OUR QUEEN~ ${name}!`;
let i = 0;
function typeEffect(){
    if(i < text.length){
        document.getElementById("title").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
typeEffect();

/* SCROLL */
const sections=document.querySelectorAll(".section");
const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("visible");
        }
    });
});
sections.forEach(sec=>observer.observe(sec));

/* STARS */
for(let i=0;i<140;i++){
    const star=document.createElement("div");
    star.classList.add("star");
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    document.body.appendChild(star);
}

/* SHOOTING STARS */
setInterval(()=>{
    const s=document.createElement("div");
    s.classList.add("shooting-star");
    s.style.left=Math.random()*80+"vw";
    s.style.top=Math.random()*30+"vh";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1200);
},2000);

/* CONFETTI */
function bigBlast(){
    for(let i=0;i<300;i++){
        const c=document.createElement("div");
        c.classList.add("confetti");
        c.style.left=Math.random()*100+"vw";
        c.style.top="-10px";
        c.style.background=`hsl(${Math.random()*360},100%,60%)`;
        c.style.animationDuration=(2+Math.random()*2)+"s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),7000);
    }
}
window.onload=bigBlast;

/* FLOWERS (LESS FREQUENT) */
function createFlower(){
    const flower=document.createElement("div");
    flower.classList.add("flower");
    flower.innerText="🌸";
    flower.style.left=Math.random()*100+"vw";
    flower.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(flower);

    setTimeout(()=>flower.remove(),6000);
}
setInterval(createFlower,600);

</script>

</body>
</html>
